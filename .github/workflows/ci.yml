name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # コアはPython標準ライブラリのみ＝依存インストール不要（pywebview/rlcard は遅延importで任意）。
      - name: Run tests (stdlib unittest)
        run: python -m unittest discover -s tests -t .

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install "ruff==0.15.20"
      # 設定は ruff.toml（select = F, E9 ＝実バグ級のみ）。
      - name: Ruff check
        run: python -m ruff check src tests

  mermaid:
    name: mermaid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli@11
      # docs の全 ```mermaid ブロックを mmdc で parse/render（構文エラーなら非0で落ちる）。
      # CI は root 実行なので Chromium sandbox を切る（--no-sandbox）。
      - name: Validate Mermaid diagrams
        run: |
          echo '{"args":["--no-sandbox","--disable-gpu"]}' > /tmp/pptr.json
          rc=0
          for f in $(grep -rl '```mermaid' --include='*.md' .); do
            echo "::group::mmdc $f"
            if mmdc -q -p /tmp/pptr.json -i "$f" -o "/tmp/$(basename "$f").out.md"; then
              echo "OK: $f"
            else
              echo "::error file=$f::Mermaid parse/render failed"; rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc

  browser:
    name: browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install playwright + chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      # views.py の WEB_HTML(JS) を headless chromium で実行し DOM の振る舞いを検証（既定 opt-in を CI で有効化）。
      # skipped でも exit0＝偽陽性の緑になり得るので、実際に走った(Ran>=1)＋skip無しを明示チェック。
      - name: Run browser behavior tests
        run: |
          ENGAWA_BROWSER_TESTS=1 python -m unittest tests.test_web_behavior -v 2>&1 | tee out.txt
          if grep -q "skipped" out.txt; then echo "::error::browser tests skipped — not actually run"; exit 1; fi
          if ! grep -qE "Ran [1-9]" out.txt; then echo "::error::no browser tests ran"; exit 1; fi
