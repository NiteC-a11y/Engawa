name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # コアはPython標準ライブラリのみ＝依存インストール不要（pywebview/rlcard は遅延importで任意）。
      - name: Run tests (stdlib unittest)
        run: python -m unittest discover -s tests -t .

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install "ruff==0.15.20"
      # 設定は ruff.toml（select = F, E9 ＝実バグ級のみ）。
      - name: Ruff check
        run: python -m ruff check src tests
